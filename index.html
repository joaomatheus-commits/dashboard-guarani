<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Parque Guarani</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header { background: #14532d; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
  header span { font-size: 0.85rem; color: #86efac; }

  .filtros { background: #1e293b; padding: 16px 32px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; border-bottom: 1px solid #334155; }
  .filtros label { font-size: 0.78rem; color: #94a3b8; display: flex; flex-direction: column; gap: 4px; }
  .filtros select { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; cursor: pointer; }
  .filtros button { background: #16a34a; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 0.85rem; cursor: pointer; margin-top: 16px; }
  .filtros button:hover { background: #15803d; }
  .filtros button.limpar { background: #475569; }
  .filtros button.limpar:hover { background: #334155; }

  .cards { display: flex; flex-wrap: wrap; gap: 16px; padding: 24px 32px 0; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px 24px; flex: 1; min-width: 160px; border-left: 4px solid; }
  .card.total  { border-color: #16a34a; }
  .card.carro  { border-color: #22c55e; }
  .card.moto   { border-color: #f59e0b; }
  .card.bike   { border-color: #a78bfa; }
  .card.truck  { border-color: #f87171; }
  .card.bus    { border-color: #38bdf8; }
  .card h3 { font-size: 0.78rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
  .card .valor { font-size: 2rem; font-weight: 700; color: #f1f5f9; margin-top: 4px; }

  .graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px 32px; }
  @media(max-width:900px) { .graficos { grid-template-columns: 1fr; } }
  .grafico-box { background: #1e293b; border-radius: 12px; padding: 20px; }
  .grafico-box h2 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 14px; text-transform: uppercase; letter-spacing:.05em; }
  .grafico-box canvas { max-height: 280px; }

  .tabela-wrap { padding: 0 32px 32px; }
  .tabela-wrap h2 { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; letter-spacing:.05em; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; font-size: 0.85rem; }
  th { background: #0f172a; color: #94a3b8; text-align: left; padding: 10px 14px; font-weight: 600; }
  td { padding: 9px 14px; border-top: 1px solid #334155; }
  tr:hover td { background: #263348; }
  .sem-dados { text-align: center; padding: 60px; color: #64748b; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Dashboard Parque Guarani — Contagem de Veículos</h1>
    <span>Processado por YOLO</span>
  </div>
</header>

<div class="filtros">
  <label>Data
    <select id="f-data"><option value="">Todas</option></select>
  </label>
  <label>Período / Horário
    <select id="f-video"><option value="">Todos</option></select>
  </label>
  <label>Tipo de Veículo
    <select id="f-tipo"><option value="">Todos</option></select>
  </label>
  <label>Trajeto
    <select id="f-trajeto"><option value="">Todos</option></select>
  </label>
  <button onclick="aplicarFiltros()">Filtrar</button>
  <button class="limpar" onclick="limparFiltros()">Limpar</button>
</div>

<div class="cards" id="cards"></div>

<div class="graficos">
  <div class="grafico-box">
    <h2>Veículos por Tipo</h2>
    <canvas id="g-tipo"></canvas>
  </div>
  <div class="grafico-box">
    <h2>Veículos por Data</h2>
    <canvas id="g-data"></canvas>
  </div>
  <div class="grafico-box">
    <h2>Veículos por Período</h2>

  </div>
  <div class="grafico-box">
    <h2>Veículos por Trajeto</h2>
    <canvas id="g-trajeto"></canvas>
  </div>
</div>

<div class="tabela-wrap">
  <h2>Detalhamento</h2>
  <div id="tabela-container"></div>
</div>

const CORES = ['#16a34a','#22c55e','#f59e0b','#a78bfa','#f87171','#38bdf8','#fb923c','#34d399','#e879f9','#facc15'];
let charts = {};

function popular_select(id, valores) {
  const sel = document.getElementById(id);
  const atual = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  valores.forEach(v => { const o = document.createElement('option'); o.value = o.textContent = v; sel.appendChild(o); });
  if ([...sel.options].some(o => o.value === atual)) sel.value = atual;
}

function filtrar(dados) {
  const data    = document.getElementById('f-data').value;
  const video   = document.getElementById('f-video').value;
  const tipo    = document.getElementById('f-tipo').value;
  const trajeto = document.getElementById('f-trajeto').value;
  return dados.filter(r =>
    (!data    || r.data    === data)    &&
    (!video   || r.video   === video)   &&
    (!tipo    || r.tipo    === tipo)    &&
    (!trajeto || r.trajeto === trajeto)
  );
}

function agrupar(dados, chave) {
  const m = {};
  dados.forEach(r => { const k = r[chave] || '—'; m[k] = (m[k] || 0) + r.quantidade; });
  return m;
}

function renderCards(dados) {
  const totais = {};
  dados.forEach(r => {
    totais['total'] = (totais['total'] || 0) + r.quantidade;
    totais[r.tipo.toLowerCase()] = (totais[r.tipo.toLowerCase()] || 0) + r.quantidade;
  });
  const labels = { total:'Total Geral', car:'Carros', carro:'Carros', moto:'Motos', bike:'Bikes', truck:'Caminhões', bus:'Ônibus' };
  const cls_map = { total:'total', car:'carro', carro:'carro', moto:'moto', bike:'bike', truck:'truck', bus:'bus' };
  const container = document.getElementById('cards');
  container.innerHTML = '';
  Object.entries(totais).forEach(([tipo, val]) => {
    const div = document.createElement('div');
    div.className = 'card ' + (cls_map[tipo] || 'total');
    div.innerHTML = `<h3>${labels[tipo] || tipo}</h3><div class="valor">${val.toLocaleString('pt-BR')}</div>`;
    container.appendChild(div);
  });
}

function renderGrafico(id, tipo, labels, valores) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type: tipo,
    data: { labels, datasets: [{ data: valores, backgroundColor: CORES.slice(0, labels.length), borderRadius: tipo==='bar'?6:0, borderWidth: 0, tension: 0.3 }] },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: tipo !== 'doughnut' ? {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
      } : undefined
    }
  });
}

function renderTabela(dados) {
  const container = document.getElementById('tabela-container');
  if (!dados.length) { container.innerHTML = '<div class="sem-dados">Nenhum dado para os filtros selecionados.</div>'; return; }
  const mapa = {};
  dados.forEach(r => { const k = [r.data,r.video,r.tipo,r.trajeto].join('|'); mapa[k] = (mapa[k]||0)+r.quantidade; });
  const linhas = Object.entries(mapa).map(([k,q]) => { const p=k.split('|'); return [...p,q]; }).sort((a,b)=>a[0].localeCompare(b[0]));
  let html = `<table><thead><tr><th>Data</th><th>Período</th><th>Tipo</th><th>Trajeto</th><th>Qtd</th></tr></thead><tbody>`;
  linhas.forEach(r => { html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td><b>${r[4].toLocaleString('pt-BR')}</b></td></tr>`; });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function atualizar() {
  const dados = filtrar(DADOS);
  renderCards(dados);
  renderGrafico('g-tipo',    'doughnut', Object.keys(agrupar(dados,'tipo')),    Object.values(agrupar(dados,'tipo')));
  renderGrafico('g-data',    'bar',      Object.keys(agrupar(dados,'data')),    Object.values(agrupar(dados,'data')));
  renderGrafico('g-video',   'bar',      Object.keys(agrupar(dados,'video')),   Object.values(agrupar(dados,'video')));
  renderGrafico('g-trajeto', 'bar',      Object.keys(agrupar(dados,'trajeto')), Object.values(agrupar(dados,'trajeto')));
  renderTabela(dados);
}

function aplicarFiltros() { atualizar(); }
function limparFiltros() {
  ['f-data','f-video','f-tipo','f-trajeto'].forEach(id => document.getElementById(id).value = '');
  atualizar();
}

popular_select('f-data',    [...new Set(DADOS.map(r=>r.data))].sort());
popular_select('f-video',   [...new Set(DADOS.map(r=>r.video))].sort());
popular_select('f-tipo',    [...new Set(DADOS.map(r=>r.tipo))].sort());
popular_select('f-trajeto', [...new Set(DADOS.map(r=>r.trajeto))].sort());

atualizar();
</script>
